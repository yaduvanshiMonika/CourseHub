<div class="student-profile-wrapper">

  <div class="page-header">
    <h2>Student Profile</h2>
    <p>Manage your profile information</p>
  </div>

  <div *ngIf="loading" class="empty-state">
    Loading profile...
  </div>

  <div class="profile-layout" *ngIf="!loading">

    <!-- LEFT CARD -->
    <div class="profile-left">
      <div class="profile-card">
        <img
          [src]="profile.photo || 'https://ui-avatars.com/api/?name=' + (profile.name || 'Student') + '&background=38bdf8&color=0f172a&size=180'"
          alt="Profile Photo"
        />
        <h3>{{ profile.name || 'Student' }}</h3>
        <p>{{ profile.email }}</p>
        <div class="count-box">
          <span>{{ profile.enrolledCourses || 0 }}</span>
          <p>Enrolled Courses</p>
        </div>
      </div>
    </div>

    <!-- RIGHT FORM -->
    <div class="profile-right">
      <div class="form-card">

        <div class="form-group">
          <label>Name</label>
          <input type="text" [(ngModel)]="profile.name" placeholder="Enter name" />
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" [value]="profile.email" disabled />
        </div>

        <div class="form-group">
          <label>Phone</label>
          <input type="text" [(ngModel)]="profile.phone" placeholder="Enter phone number" />
        </div>

        <div class="form-group">
          <label>Bio</label>
          <textarea [(ngModel)]="profile.bio" rows="5" placeholder="Write something about yourself"></textarea>
        </div>

        <div class="form-group">
          <label>Photo URL</label>
          <div class="photo-input-row">
            <input type="text" [(ngModel)]="profile.photo" placeholder="Enter photo URL" />
            <button class="secondary-btn" (click)="updatePhoto()">Update</button>
          </div>
        </div>

        <div class="button-row">
          <button class="primary-btn" (click)="updateProfile()" [disabled]="saving">
            {{ saving ? 'Saving...' : 'Save Profile' }}
          </button>
        </div>

      </div>
    </div>

  </div>
</div>
