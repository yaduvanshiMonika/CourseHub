<div class="learning-wrapper">

  <div class="learning-header">
    <h2>{{ course?.title }}</h2>

    <div class="progress-box">
      <div class="progress-bar">
        <div class="progress-fill" [style.width.%]="progressPercent"></div>
      </div>
      <span>{{ progressPercent }}%</span>
    </div>
  </div>

  <div class="learning-body">

    <div class="lesson-list">
      <h3>Lessons</h3>

      <div
        class="lesson-item"
        *ngFor="let lesson of lessons"
        [class.active]="selectedLesson?.position === lesson.position"
        (click)="selectLesson(lesson)"
      >
        <p>{{ lesson.title }}</p>
      </div>
    </div>

    <div class="lesson-content">

      <div *ngIf="!selectedLesson" class="empty-box">
        Select a lesson to start learning
      </div>

      <div *ngIf="selectedLesson">
        <h3>{{ selectedLesson.title }}</h3>

        <div *ngIf="selectedLesson.video_url" class="video-box">
          <iframe
            width="100%"
            height="400"
            [src]="selectedLesson.video_url | safe"
            frameborder="0"
            allowfullscreen>
          </iframe>
        </div>

        <div *ngIf="selectedLesson.pdf_name" class="pdf-box">
          <div class="pdf-info">
            📄 {{ selectedLesson.pdf_name }}
          </div>
<button
  type="button"
  class="pdf-btn"
  [disabled]="!selectedLesson.pdf_url"
  (click)="openPdf(selectedLesson.pdf_url)"
>
  Download PDF
</button>
        </div>

      </div>

    </div>

  </div>
</div>
