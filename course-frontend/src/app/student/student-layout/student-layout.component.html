<div class="student-layout">
  <aside class="sidebar">
    <div class="logo-box">
      <p>Welcome, {{ studentName }}</p>
      <p class="enrollment-badge" *ngIf="enrolledCourseCount !== null">
        {{ enrolledCourseCount }} course{{ enrolledCourseCount === 1 ? '' : 's' }} enrolled
      </p>
    </div>

    <nav class="menu">
      <a routerLink="/student/student-dashboard" routerLinkActive="active">Dashboard</a>
      <a routerLink="/student/student-courses" routerLinkActive="active">My Courses</a>
      <!-- <a routerLink="/student/profile" routerLinkActive="active">Profile</a> -->
      <a routerLink="/student/messages" routerLinkActive="active">Messages</a>
      <!-- <a routerLink="/student/certificates" routerLinkActive="active">Certificates</a> -->
    </nav>
  </aside>

  <main class="content-area">
    <div class="topbar-full">
      <div class="brand">&lt; CourseHub</div>

      <app-user-menu roleLabel="Student" [showBackToSite]="true" [showPanelLinks]="false"></app-user-menu>
    </div>

    <div class="page-body">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
