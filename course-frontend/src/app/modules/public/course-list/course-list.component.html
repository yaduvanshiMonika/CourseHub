<div class="courses-page">
  <div class="course-container">
    <div class="course-grid">
      <div class="course-card" *ngFor="let course of courses">

        <!-- IMAGE: thumbnail URL/file if set, else YouTube poster only — no default placeholder -->
        <div class="image-box" [class.image-box--empty]="!(course | tutorialCardImage)">
          <img
            *ngIf="(course | tutorialCardImage) as cardImg"
            [src]="cardImg"
            alt=""
            loading="lazy"
            (error)="onCardImageError($event)"
          >
        </div>

        <!-- CONTENT -->
        <div class="content">
          <h3>{{ course.title }}</h3>
          <p class="category">{{ course.category }}</p>
          <p class="instructor">👨‍🏫 {{ course.instructor }}</p>

          <div class="bottom">
            <span class="price">₹{{ course.price }}</span>

            <a [routerLink]="['/course', course.id]" class="btn">
              View Details
            </a>

            <!-- Enroll button - student ya non-logged in ko dikhega -->
            <button 
              class="btn enroll-btn" 
              (click)="enroll(course)"
              *ngIf="role === 'student' || !isLoggedIn">
              Enroll
            </button>

          </div>
        </div>

      </div>
    </div>
  </div>
</div>
