<div class="teacher-container">
  <div class="upload-card">
    <h2>Teacher Portal: Upload Content 📚</h2>
    <p>Add new video lectures or PDF resources to your courses.</p>

    <form (ngSubmit)="handleUpload()">
      <div class="form-group">
        <label>Course ID</label>
        <input type="number" name="course_id" [(ngModel)]="contentData.course_id" placeholder="Enter Course ID" required>
      </div>

      <div class="form-group">
        <label>Lecture Title</label>
        <input type="text" name="title" [(ngModel)]="contentData.title" placeholder="e.g. Introduction to Angular" required>
      </div>

      <div class="form-group">
        <label>Content Type</label>
        <select name="type" [(ngModel)]="contentData.type">
          <option value="video">YouTube Video URL</option>
          <option value="pdf">PDF Document Link</option>
        </select>
      </div>

      <div class="form-group">
        <label>Resource URL</label>
        <input type="text" name="url" [(ngModel)]="contentData.url" placeholder="Paste link here" required>
      </div>

      <button type="submit" class="btn-upload">Publish Content</button>
    </form>
  </div>
</div>
