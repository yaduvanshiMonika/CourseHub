<div class="add-course-page">
  <div class="form-card">
    <!-- <h2>{{ isEditMode ? 'Edit Course' : 'Add Course' }}</h2> -->

    <form (ngSubmit)="submitCourse()">
      <div class="form-group">
        <label>Title</label>
        <input type="text" [(ngModel)]="courseData.title" name="title" required />
      </div>

      <div class="form-group">
        <label>Category</label>
        <input type="text" [(ngModel)]="courseData.category" name="category" required />
      </div>

      <div class="form-group">
        <label>Instructor</label>
        <input type="text" [(ngModel)]="courseData.instructor" name="instructor" />
      </div>
      
      <div class="form-group">
        <label>Price</label>
        <input type="number" [(ngModel)]="courseData.price" name="price" />
      </div>

      <div class="form-group">
        <label>Status</label>
        <select [(ngModel)]="courseData.status" name="status">
          <option value="draft">Draft</option>
          <option value="published">Published</option>
          <!-- <option value="archived">Archived</option> -->
        </select>
      </div>

      <div class="form-group">
  <label>Level</label>
  <select [(ngModel)]="courseData.level" name="level">
    <option value="beginner">Beginner</option>
    <option value="intermediate">Intermediate</option>
    <option value="advanced">Advanced</option>
  </select>
</div>

      <div class="form-group">
        <label>Course Validity (days)</label>
        <select [(ngModel)]="courseData.validity_days" name="validity_days" required>
          <option [ngValue]="90">90 days</option>
          <option [ngValue]="180">180 days</option>
        </select>
      </div>

      <div class="form-group">
        <label>Video Link</label>
        <input type="text" [(ngModel)]="courseData.video_link" name="video_link" />
      </div>

      <div class="form-group">
        <label>Thumbnail URL</label>
        <input type="text" [(ngModel)]="courseData.thumbnailUrl" name="thumbnailUrl" />
      </div>

      <div class="form-group full-width">
        <label>Description</label>
        <textarea [(ngModel)]="courseData.description" name="description" rows="2"></textarea>
      </div>

      <button type="submit" class="submit-btn">
        {{ isEditMode ? 'Update Course' : 'Add Course' }}
      </button>
    </form>
  </div>
</div>

<!-- Success Modal -->
<div class="swirl-overlay" *ngIf="showSuccessModal" (click)="closeModal()">
  <div class="swirl-modal" (click)="$event.stopPropagation()">
    <div class="swirl-icon-ring success">
      <svg viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h3 class="swirl-title">{{ swirlMessage }}</h3>
    <button type="button" class="swirl-btn" (click)="closeModal()">OK</button>
  </div>
</div>

<!-- Error Modal -->
<div class="swirl-overlay" *ngIf="showErrorModal" (click)="closeErrorModal()">
  <div class="swirl-modal" (click)="$event.stopPropagation()">
    <div class="swirl-icon-ring error">
      <svg viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </div>
    <h3 class="swirl-title">{{ swirlMessage }}</h3>
    <button type="button" class="swirl-btn" (click)="closeErrorModal()">OK</button>
  </div>
</div>
