<div class="course-contents-page">
  <h2>Course Contents</h2>

  <div class="content-form-card">
    <form (ngSubmit)="submitContent()">
      <div class="form-group">
        <input
          type="text"
          [(ngModel)]="contentData.title"
          name="title"
          placeholder="Content title"
          required
        />
      </div>

      <div class="form-group">
        <label>Video URL (Optional)</label>
        <input
          type="text"
          [(ngModel)]="contentData.url"
          name="url"
          placeholder="Enter video URL"
        />
      </div>

      <div class="form-group">
        <label>Upload PDF (Optional)</label>
        <input
          type="file"
          accept="application/pdf"
          (change)="onFileSelect($event)"
        />
      </div>

      <div class="form-group">
        <input
          type="number"
          [(ngModel)]="contentData.duration"
          name="duration"
          placeholder="Duration"
        />
      </div>

      <div class="form-group">
        <input
          type="number"
          [(ngModel)]="contentData.position"
          name="position"
          placeholder="Position"
          required
        />
      </div>

  

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">
          {{ isEditMode ? 'Update Content' : 'Add Content' }}
        </button>

        <button
          *ngIf="isEditMode"
          type="button"
          class="btn btn-secondary"
          (click)="cancelEdit()"
        >
          Cancel
        </button>
      </div>
    </form>
  </div>

  <div *ngIf="isLoading" class="loading-box">
    Loading contents...
  </div>

  <div *ngIf="!isLoading && groupedContents.length === 0" class="empty-box">
    No contents found.
  </div>

  <div class="content-list" *ngIf="!isLoading && groupedContents.length > 0">
    <div class="content-card" *ngFor="let content of groupedContents">
      <div class="content-card-inner">
        <!-- LEFT -->
        <div class="content-info">
          <h3>{{ content.title }}</h3>
          <p><strong>Type:</strong> {{ content.typeLabel }}</p>
          <p><strong>Position:</strong> {{ content.position }}</p>
          <p><strong>Duration:</strong> {{ content.duration }}</p>
        </div>

        <!-- RIGHT -->
        <div class="content-media">
          <div *ngIf="content.videoUrl" class="video-container">
            <iframe
              [src]="getSafeUrl(content.videoUrl)"
              frameborder="0"
              allowfullscreen
            ></iframe>
          </div>

          <div *ngIf="content.pdfUrl" class="pdf-file">
            <div class="pdf-info">
              <div class="pdf-icon">📄</div>

              <div class="pdf-details">
               <!-- <p class="pdf-name">{{ getPdfDisplayName(content.pdfUrl) }}</p> -->
                <p class="pdf-name">{{ getPdfDisplayName(content.pdfName) }}</p>
                 <p class="pdf-type">PDF File</p>
              </div>
            </div>

            <!-- <a
              [href]="getFileUrl(content.pdfUrl)"
              download
              class="btn btn-download"
            >
              ⬇ Download PDF
            </a> -->

<a
  [href]="'http://localhost:5000/api/teacher/content/pdf/' + content.pdfId"
  class="btn btn-download"
>
  ⬇ Download PDF
</a>

          </div>

          <div class="content-actions">
            <button class="btn btn-warning" (click)="editContent(content)">
              Edit
            </button>

            <button
              class="btn btn-danger"
              (click)="deleteContent(content.videoId || content.pdfId)"
            >
              Delete
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
