<div class="page-box">
  <h2>Course Enrollments</h2>

  <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

  <div *ngIf="enrollments.length > 0; else noData" class="enrollment-list">
    <div class="enrollment-card" *ngFor="let student of enrollments">
      <h4>{{ student.student_name }}</h4>
      <p>{{ student.student_email }}</p>
      <small>Enrolled At: {{ student.enrolled_at }}</small>
    </div>
  </div>

  <ng-template #noData>
    <div class="empty-box">No enrollments found.</div>
  </ng-template>
