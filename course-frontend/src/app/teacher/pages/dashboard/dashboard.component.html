<div class="teacher-layout">
  <aside class="sidebar">
    <div class="logo-box">
      <p>Welcome, {{ teacherName }}</p>
    </div>

    <nav class="menu">
      <a routerLink="/teacher/add-course" routerLinkActive="active">Add Course</a>
      <a routerLink="/teacher/my-courses" routerLinkActive="active">My Courses</a>
    </nav>
    <!-- <p class="sidebar-hint">Student enrollments: open <strong>My Courses</strong>, then <strong>Enrollments</strong> on a course.</p> -->
  </aside>

  <main class="content-area">

    <!--  TOP HEADER (CourseHub style) -->
    <div class="topbar-full">
      <div class="brand">&lt; CourseHub</div>

      <app-user-menu roleLabel="Teacher" [showBackToSite]="true" [showPanelLinks]="false"></app-user-menu>
    </div>

    <!-- PAGE -->
    <div class="page-body">
      <router-outlet></router-outlet>
    </div>

  </main>
</div>
