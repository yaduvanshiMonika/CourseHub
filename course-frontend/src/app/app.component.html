<!-- MAIN PAGE — blurs when login is open -->
<div class="app-page" [class.blurred]="showLogin">
  <app-navbar
    *ngIf="!isAdminRoute()"
    [showLoginFn]="openLogin.bind(this)">
  </app-navbar>
  <router-outlet></router-outlet>
</div>

<!-- DARK BACKDROP — click to close -->
<div class="page-backdrop"
     [class.active]="showLogin"
     (click)="closeLogin()">
</div>

<!-- LOGIN DRAWER — slides in from right -->
<div class="login-drawer" [class.open]="showLogin">
  <button class="drawer-close" (click)="closeLogin()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <line x1="18" y1="6" x2="6" y2="18"/>
      <line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>
  <app-login *ngIf="showLogin" (closeOverlay)="closeLogin()"></app-login>
</div>
