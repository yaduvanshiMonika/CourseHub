<div class="um-profile" (click)="toggle(); $event.stopPropagation()">
  <div class="um-avatar-circle">{{ avatarLetter }}</div>

  <div class="um-profile-text">
    <span class="um-profile-name">{{ userName }}</span>
    <span class="um-profile-role">{{ displayRole }}</span>
  </div>

  <svg class="um-chevron" [class.um-rotated]="menuOpen"
    width="14" height="14" viewBox="0 0 24 24"
    fill="none" stroke="currentColor" stroke-width="2.5">
    <polyline points="6 9 12 15 18 9"/>
  </svg>

  <div class="um-dropdown" *ngIf="menuOpen" (click)="$event.stopPropagation()">
    <div class="um-dropdown-header">
      <div class="um-dh-avatar">{{ avatarLetter }}</div>
      <div class="um-dh-info">
        <span class="um-dh-name">{{ userName }}</span>
        <span class="um-dh-role">{{ displayRole }}</span>
      </div>
    </div>

    <div class="um-divider"></div>

    <div class="um-item" *ngIf="showPanelLinks" (click)="goToPanel()">
      <span class="um-icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 4h18v14H3z"/>
          <path d="M8 20h8"/>
          <path d="M12 14v6"/>
        </svg>
      </span>
      <span>Go to Panel</span>
    </div>

    <div class="um-item" *ngIf="userRole === 'student'" (click)="goToSupportMessages()">
      <span class="um-icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 4h16v12H5l-3 3V4z"/>
        </svg>
      </span>
      <span>Support messages</span>
    </div>

    <div class="um-item" *ngIf="showBackToSite" (click)="goToSite()">
      <span class="um-icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
      </span>
      <span>Back to Site</span>
    </div>

    <div class="um-item um-logout" (click)="logout()">
      <span class="um-icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </span>
      <span>Logout</span>
    </div>
  </div>
</div>
