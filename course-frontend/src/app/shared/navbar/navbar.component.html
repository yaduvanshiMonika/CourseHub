<nav class="navbar">
  <div class="nav-wrapper">

    <!-- LEFT LOGO -->
    <!-- <div class="logo">&lt; CourseHub</div> -->
     <div class="logo">
  <img src="assets/svayamtech_logo.png" alt="CourseHub Logo" class="logo-img">
</div>

    <!-- CENTER PILL -->

    <div class="nav-pill">
      <a routerLink="/"
         routerLinkActive="active-link"
         [routerLinkActiveOptions]="{ exact: true }"
         (click)="setActive('home')">Home</a>

      <a routerLink="/courses"
         routerLinkActive="active-link"
         (click)="setActive('courses')">Tutorials</a>

      <a routerLink="/"
         fragment="contact"
         (click)="setActive('contact')"
         [class.active-manual]="activeTab === 'contact'">Contact Us</a>

  
 <a routerLink="/"
   fragment="webinar"
   (click)="setActive('webinar')"
   [class.active-manual]="activeTab === 'webinar'">Webinar</a>

      <!-- <a href="#" (click)="setActive('hackathon')"
         [class.active-manual]="activeTab === 'hackathon'">Hackathon</a> -->
    </div>

    <div class="nav-pub-trailing">
        <button
          type="button"
          class="pub-theme-btn"
          (click)="theme.toggle(); $event.stopPropagation()"
          [attr.aria-label]="theme.isLight ? 'Switch to dark mode' : 'Switch to light mode'"
          [title]="theme.isLight ? 'Dark mode' : 'Light mode'">
          <svg *ngIf="!theme.isLight" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
          <svg *ngIf="theme.isLight" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>

    <button class="login-btn" *ngIf="!isLoggedIn()" (click)="openLogin()">
  → Login
</button>
    <div class="profile" *ngIf="isLoggedIn()" (click)="toggleDropdown()">

      <!-- AVATAR -->
      <div class="avatar-circle">
        {{ (userName || 'U')[0].toUpperCase() }}
      </div>

      <!-- NAME + ROLE -->
      <div class="profile-text">
        <span class="profile-name">{{ userName }}</span>
        <span class="profile-role">{{ userRole | titlecase }}</span>
      </div>

      <!-- CHEVRON -->
      <svg class="chevron-icon" [class.rotated]="showDropdown"
        width="13" height="13" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="6 9 12 15 18 9"/>
      </svg>

      <!-- DROPDOWN -->
      <div class="dropdown" *ngIf="showDropdown">

        <!-- HEADER -->
        <div class="dropdown-header">
          <div class="dh-avatar">{{ (userName || 'U')[0].toUpperCase() }}</div>
          <div class="dh-info">
            <span class="dh-name">{{ userName }}</span>
            <span class="dh-role">{{ userRole | titlecase }}</span>
          </div>
        </div>

        <div class="dropdown-divider"></div>

        <!-- ADMIN PANEL -->
        <div class="dropdown-item" *ngIf="userRole === 'admin'" (click)="goToAdmin()">
          <span class="di-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7"/>
              <rect x="14" y="3" width="7" height="7"/>
              <rect x="14" y="14" width="7" height="7"/>
              <rect x="3" y="14" width="7" height="7"/>
            </svg>
          </span>
          <span>Admin Panel</span>
        </div>

        <!-- TEACHER PANEL -->
        <div class="dropdown-item" *ngIf="userRole === 'teacher'" (click)="goToTeacher()">
          <span class="di-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
          </span>
          <span>Teacher Panel</span>
        </div>

        <!-- STUDENT PANEL -->
        <div class="dropdown-item" *ngIf="userRole === 'student'" (click)="goToStudent()">
          <span class="di-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2">
              <path d="M3 4h18v14H3z"/>
              <path d="M8 20h8"/>
              <path d="M12 14v6"/>
            </svg>
          </span>
          <span>Student Panel</span>
        </div>

        <!-- LOGOUT -->

        <div class="dropdown-item logout-item" (click)="logout()">
          <span class="di-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </span>
          <span>Logout</span>
        </div>

      </div>
    </div>
    </div>

  </div>
</nav>
